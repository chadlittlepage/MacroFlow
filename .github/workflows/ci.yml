name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Lint + types + import smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz

      - name: Ruff
        run: ruff check src/

      - name: Mypy
        run: mypy --ignore-missing-imports --no-strict-optional src/macroflow

      - name: Import smoke
        env:
          PYTHONPATH: src
        run: |
          python -c "
          from macroflow import (
              app, macro, macro_editor, settings_window, about_window,
              log_capture, console_window, help_window,
          )
          from macroflow.backends import resolve, videohub
          print('all modules import cleanly')
          "

  build-dry-run:
    name: py2app dry build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install py2app
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz

      - name: Build .app (no signing)
        run: |
          python setup.py py2app -A
          test -d dist/MacroFlow.app
