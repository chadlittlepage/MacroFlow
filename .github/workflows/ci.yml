name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed to publish the coverage badge to a side branch

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Lint + types + import smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz

      - name: Ruff lint
        run: ruff check src/

      - name: Mypy
        run: mypy --ignore-missing-imports --no-strict-optional src/macroflow

      - name: Import smoke
        env:
          PYTHONPATH: src
        run: |
          python -c "
          from macroflow import (
              app, macro, macro_editor, settings_window, about_window,
              log_capture, console_window, help_window, quad_preview,
          )
          from macroflow.backends import resolve, videohub, local_dimming
          print('all modules import cleanly')
          "

      - name: Pytest with coverage
        env:
          PYTHONPATH: src
        run: |
          pip install pytest pytest-cov
          pytest tests/ -q \
            --cov=macroflow \
            --cov-report=term

      # Publish a coverage badge to a side branch ("coverage-badge") so the
      # README can pull a raw SVG without depending on Codecov / external
      # tokens. Only runs on direct pushes to main. Uses shields.io as the
      # SVG generator — no extra Python deps.
      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PCT="$(python -m coverage report --format=total)"
          if [ "${PCT}" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "${PCT}" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          curl -fsSL \
            "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}" \
            -o /tmp/coverage.svg
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          rm -rf /tmp/badge-wt
          if git ls-remote --exit-code --heads origin coverage-badge >/dev/null 2>&1; then
            git fetch origin coverage-badge
            git worktree add /tmp/badge-wt origin/coverage-badge
            cd /tmp/badge-wt
            git checkout -B coverage-badge
          else
            git worktree add --no-checkout /tmp/badge-wt
            cd /tmp/badge-wt
            git checkout --orphan coverage-badge
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/coverage.svg coverage.svg
          git add coverage.svg
          if git diff --staged --quiet; then
            echo "Coverage badge unchanged — skipping commit."
          else
            git commit -m "ci: refresh coverage badge (${PCT}%)"
            git push origin coverage-badge
          fi

  build-dry-run:
    name: py2app dry build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install py2app
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz

      - name: Build .app (no signing)
        # py2app trips on `pyproject.toml [project] dependencies` with
        # newer setuptools ("install_requires is no longer supported"),
        # so we move pyproject.toml out of the way for the build —
        # mirrors what build_and_sign.sh does locally.
        run: |
          if [ -f pyproject.toml ]; then
            mv pyproject.toml pyproject.toml.bak
          fi
          python setup.py py2app -A
          if [ -f pyproject.toml.bak ]; then
            mv pyproject.toml.bak pyproject.toml
          fi
          test -d dist/MacroFlow.app
